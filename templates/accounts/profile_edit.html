{% extends "base.html" %}

{% block title %}编辑资料 | LearningWebsite{% endblock %}

{% block content %}
<section class="card" style="max-width:760px;">
    <h1 style="margin-top:0;">编辑资料</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-row">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
            <button type="submit" class="btn">保存修改</button>
            <a class="btn btn-outline" href="{% url 'accounts:index' %}">返回</a>
        </div>
    </form>
</section>
{% endblock %}
